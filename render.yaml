services:
  - type: web
    name: resume-analyzer-backend
    runtime: java
    plan: free
    rootDir: .
    buildCommand: mvn clean package
    startCommand: java -jar target/resume-analyzer-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    envVars:
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
